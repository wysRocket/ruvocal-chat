name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ADAPTER=netlify npm run build
        env:
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          RVF_DB_PATH: /tmp/ruvocal-db
          PUBLIC_APP_NAME: RuFlo Chat
          NODE_ENV: production

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --dir=build --functions=.netlify/functions --prod --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
